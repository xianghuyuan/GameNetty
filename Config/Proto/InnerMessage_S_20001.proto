}

// ResponseType L2G_AddLoginRecord
message G2L_AddLoginRecord // IRequest
{
	int32 RpcId = 1;
	string AccountName = 2;
	int32 ServerId = 3;
}

message L2G_AddLoginRecord // IResponse

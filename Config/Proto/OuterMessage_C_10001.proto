// ========== 副本系统 (Dungeon System) ==========

// ResponseType M2C_EnterDungeon
message C2M_EnterDungeon // ISessionRequest
{
    int32 RpcId = 1;
    int32 dungeonConfigId = 2;  // 副本配置ID
}

message M2C_EnterDungeon // ISessionResponse

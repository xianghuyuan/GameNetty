    int32 RpcId = 1;
    int32 Error = 2;
    string Message = 3;
    int64 dungeonInstanceId = 4;
    int64 battleId = 5;
}

// 副本开始（服务器主动推送）
message M2C_DungeonStart // IMessage
{
    int64 dungeonInstanceId = 1;
    int64 teamId = 2;
    int32 dungeonConfigId = 3;
}

// 副本完成（服务器主动推送）
message M2C_DungeonComplete // IMessage
{
    int64 dungeonInstanceId = 1;
    bool success = 2;
    int32 duration = 3;  // 持续时间（秒）
    map<int64, int32> playerDamage = 4;  // 玩家伤害统计
}

// ========== 战斗表现同步 (Combat Visual Sync) ==========

// 伤害同步（服务器推送）
message M2C_Damage // IMessage
{
    int64 attackerId = 1;       // 攻击者ID
    int64 targetId = 2;         // 目标ID
    int32 damage = 3;           // 伤害值
    bool isCrit = 4;            // 是否暴击
    int32 targetCurrentHp = 5;  // 目标当前血量
    int32 targetMaxHp = 6;      // 目标最大血量
    bool targetDead = 7;        // 目标是否死亡
    int32 damageType = 8;       // 伤害类型: 0=普攻, 1=技能, 2=DOT, 3=反伤
}

// 治疗同步（服务器推送）
message M2C_Heal // IMessage
{
    int64 casterId = 1;         // 施法者ID
    int64 targetId = 2;         // 目标ID
    int32 healAmount = 3;       // 治疗量
    int32 targetCurrentHp = 4;  // 目标当前血量
    int32 targetMaxHp = 5;      // 目标最大血量
    int32 healType = 6;         // 治疗类型: 0=技能, 1=HOT, 2=吸血
}

// Buff添加同步（服务器推送）
message M2C_BuffAdd // IMessage
{
    int64 unitId = 1;           // 单位ID
    int64 buffId = 2;           // Buff实例ID
    int32 configId = 3;         // Buff配置ID
    int64 casterId = 4;         // 施法者ID
    int32 effectType = 5;       // 效果类型
    int64 duration = 6;         // 持续时间(ms)
    int32 stacks = 7;           // 层数
    bool isBuff = 8;            // 是否增益
}

// Buff移除同步（服务器推送）
message M2C_BuffRemove // IMessage
{
    int64 unitId = 1;           // 单位ID
    int64 buffId = 2;           // Buff实例ID
    int32 configId = 3;         // Buff配置ID
    bool isExpired = 4;         // 是否自然过期
}

// Buff层数更新（服务器推送）
message M2C_BuffStackUpdate // IMessage
{
    int64 unitId = 1;           // 单位ID
    int64 buffId = 2;           // Buff实例ID
    int32 configId = 3;         // Buff配置ID
    int32 stacks = 4;           // 当前层数
}

// 单位血量同步（服务器推送）
message M2C_UnitHpSync // IMessage
{
    int64 unitId = 1;           // 单位ID
    int32 currentHp = 2;        // 当前血量
    int32 maxHp = 3;            // 最大血量
    int64 shieldValue = 4;      // 护盾值

// 单位死亡同步（服务器推送）
message M2C_UnitDead // IMessage
{
    int64 unitId = 1;           // 死亡单位ID
    int64 killerId = 2;         // 击杀者ID
}

// 技能释放同步（服务器推送给周围玩家）
message M2C_SkillCast // IMessage
{
    int64 casterId = 1;         // 施法者ID
    int32 skillId = 2;          // 技能ID
    int64 targetId = 3;         // 目标ID（可选）
    Unity.Mathematics.float3 targetPos = 4;  // 目标位置（AOE技能用）
}

// 怪物AI状态变化（服务器推送）
message M2C_MonsterStateChange // IMessage
{
    int64 unitId = 1;           // 怪物ID
    string state = 2;           // 状态名称
}

// Room内资源奖励同步（服务器推送）
message M2C_RoomRewardSync // IMessage
{
    int64 AddMoney = 1;         // 本次增加的金币
    int64 TotalMoney = 2;       // 当前总金币
}

}

// 战斗结果
message CombatResultProto
{
    int64 attackerId = 1;
    int64 targetId = 2;
    int32 damage = 3;
    int32 attackerCurrentHp = 4;
    int32 targetCurrentHp = 5;
    bool targetDead = 6;
    bool attackerDead = 7;
}

// ========== 战斗系统 (Battle System) ==========

// ResponseType M2C_StartBattle
message C2M_StartBattle // ILocationRequest
{
    int32 RpcId = 1;
    int32 battleType = 2;  // 战斗类型: 0=WaveBattle, 1=Dungeon, 2=Boss
    int32 totalWaves = 3;  // 总波数（波次战斗用）
}

message M2C_StartBattle // ILocationResponse
{
    int32 RpcId = 1;
    int32 Error = 2;
    string Message = 3;
    int64 battleId = 4;
}

// 战斗结束（服务器主动推送）
message M2C_BattleEnd // IMessage
{
    int64 battleId = 1;
    bool success = 2;
    int32 duration = 3;  // 持续时间（秒）
    map<int64, int32> playerDamage = 4;  // 玩家伤害统计
}

// 波次开始（服务器主动推送）
message M2C_WaveStart // IMessage
{
    int64 battleId = 1;
    int32 waveNumber = 2;
    int32 totalWaves = 3;
    int32 monsterCount = 4;
}

// 波次完成（服务器主动推送）
message M2C_WaveComplete // IMessage
{
    int64 battleId = 1;
    int32 waveNumber = 2;
    int32 totalWaves = 3;
    int32 duration = 4;  // 持续时间（秒）
}

// ResponseType M2C_ExitBattle
// 客户端主动退出战斗
message C2M_ExitBattle // ILocationRequest
{
    int32 RpcId = 1;
    int64 battleId = 2;
}

message M2C_ExitBattle // ILocationResponse
{
    int32 RpcId = 1;
    int32 Error = 2;
    string Message = 3;
}

// ResponseType M2C_TeamStartBattle
// 队长开启组队战斗
message C2M_TeamStartBattle // ILocationRequest
{
    int32 RpcId = 1;
    int64 teamId = 2;      // 队伍ID
    int32 battleType = 3;  // 战斗类型
    int32 totalWaves = 4;  // 总波数（波次战斗用）
}

message M2C_TeamStartBattle // ILocationResponse
{
    int32 RpcId = 1;
    int32 Error = 2;
    string Message = 3;
    int64 battleId = 4;    // 实际上是 RoomId
    repeated int64 memberIds = 5;  // 所有参战成员ID
}

// ResponseType M2C_JoinTeamBattle
// 队员加入进行中的战斗
message C2M_JoinTeamBattle // ILocationRequest
{
    int32 RpcId = 1;
    int64 battleId = 2;    // RoomId
}

message M2C_JoinTeamBattle // ILocationResponse
{
    int32 RpcId = 1;
    int32 Error = 2;
    string Message = 3;
    repeated int64 memberIds = 4;  // 当前所有成员
}


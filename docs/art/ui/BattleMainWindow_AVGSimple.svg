<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #182027; }
      .horizon { fill: #24333b; }
      .ground { fill: #2b241d; }
      .panel { fill: rgba(12, 18, 22, 0.78); stroke: #d8bd72; stroke-width: 2; }
      .panelSoft { fill: rgba(19, 29, 35, 0.72); stroke: #78909a; stroke-width: 1.5; }
      .gold { fill: #d8bd72; }
      .hpBg { fill: #4c2630; }
      .hp { fill: #d84d45; }
      .mp { fill: #5da5e8; }
      .text { font: 700 18px sans-serif; fill: #f7eed4; }
      .small { font: 400 13px sans-serif; fill: #cad7dc; }
      .dark { font: 700 15px sans-serif; fill: #172027; }
      .button { fill: rgba(20, 31, 38, 0.92); stroke: #d8bd72; stroke-width: 2; }
      .buttonText { font: 700 18px sans-serif; fill: #f7eed4; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#617680"/>
      <stop offset="0.58" stop-color="#8c9a84"/>
      <stop offset="1" stop-color="#c8aa54"/>
    </linearGradient>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <rect width="1280" height="370" fill="url(#sky)"/>
  <rect class="ground" y="370" width="1280" height="350"/>

  <!-- top status -->
  <g filter="url(#shadow)">
    <rect class="panelSoft" x="34" y="28" width="250" height="64" rx="10"/>
    <text class="text" x="58" y="55">玩家</text>
    <rect class="hpBg" x="116" y="43" width="132" height="10" rx="5"/>
    <rect class="hp" x="116" y="43" width="94" height="10" rx="5"/>
    <rect fill="#273c4c" x="116" y="65" width="132" height="8" rx="4"/>
    <rect class="mp" x="116" y="65" width="76" height="8" rx="4"/>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel" x="400" y="24" width="480" height="58" rx="14"/>
    <text class="text" x="594" y="48">Boss</text>
    <rect class="hpBg" x="448" y="58" width="384" height="10" rx="5"/>
    <rect class="hp" x="448" y="58" width="266" height="10" rx="5"/>
  </g>

  <g filter="url(#shadow)">
    <rect class="panelSoft" x="1010" y="28" width="220" height="64" rx="10"/>
    <text class="text" x="1038" y="56">第 3 / 8 波</text>
    <text class="small" x="1038" y="78">剩余怪物 42</text>
  </g>

  <!-- temporary alert -->
  <g filter="url(#shadow)">
    <rect fill="rgba(216, 77, 69, 0.82)" stroke="#ffd8cc" stroke-width="1.5" x="496" y="108" width="288" height="34" rx="8"/>
    <text class="dark" x="588" y="131">危险预警</text>
  </g>

  <!-- simple battle silhouettes -->
  <circle cx="624" cy="332" r="30" fill="#80d278" stroke="#f4ffe8" stroke-width="4"/>
  <circle cx="500" cy="318" r="18" fill="#bf625a"/>
  <circle cx="735" cy="310" r="20" fill="#bf625a"/>
  <circle cx="790" cy="356" r="16" fill="#bf625a"/>

  <!-- AVG command panel -->
  <g filter="url(#shadow)">
    <rect class="panel" x="42" y="520" width="1196" height="158" rx="16"/>
    <rect fill="rgba(216, 189, 114, 0.94)" x="68" y="542" width="150" height="40" rx="8"/>
    <text class="dark" x="106" y="568">战斗指令</text>

    <text class="text" x="74" y="618">发射器已锁定目标。</text>
    <text class="small" x="74" y="646">选择技能槽释放，或保持自动战斗继续推进。</text>

    <rect class="panelSoft" x="716" y="548" width="92" height="42" rx="10"/>
    <text class="small" x="738" y="574">自动 ON</text>

    <circle class="button" cx="858" cy="606" r="36"/>
    <text class="buttonText" x="853" y="613">1</text>
    <circle class="button" cx="944" cy="606" r="36"/>
    <text class="buttonText" x="939" y="613">2</text>
    <circle class="button" cx="1030" cy="606" r="36"/>
    <text class="buttonText" x="1025" y="613">3</text>
    <circle class="button" cx="1116" cy="606" r="36"/>
    <text class="buttonText" x="1111" y="613">4</text>

    <rect class="panelSoft" x="1160" y="548" width="54" height="42" rx="10"/>
    <text class="small" x="1174" y="574">暂停</text>
  </g>
</svg>

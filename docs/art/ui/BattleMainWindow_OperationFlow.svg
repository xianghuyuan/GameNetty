<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #182027; }
      .stage { fill: #25323a; stroke: #66757f; stroke-width: 2; }
      .safe { fill: none; stroke: #8aa0aa; stroke-width: 2; stroke-dasharray: 8 8; }
      .panel { fill: #f6efd9; stroke: #c7aa64; stroke-width: 2; }
      .panel2 { fill: #e9f3ef; stroke: #72a58c; stroke-width: 2; }
      .danger { fill: #ffe1df; stroke: #d85d58; stroke-width: 2; }
      .button { fill: #efe2bf; stroke: #b98b36; stroke-width: 2; }
      .skill { fill: #303f48; stroke: #d6b35a; stroke-width: 3; }
      .cooldown { fill: rgba(0,0,0,0.45); }
      .text { font: 700 18px sans-serif; fill: #1f2a30; }
      .small { font: 400 14px sans-serif; fill: #34444c; }
      .hudText { font: 700 18px sans-serif; fill: #f8f1dc; }
      .hint { font: 400 14px sans-serif; fill: #c7d3d8; }
      .title { font: 700 28px sans-serif; fill: #f8f1dc; }
      .arrow { stroke: #f0c85a; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .flow { stroke: #79c5ff; stroke-width: 3; fill: none; marker-end: url(#flowArrow); stroke-dasharray: 8 6; }
    </style>

    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#f0c85a"/>
    </marker>

    <marker id="flowArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#79c5ff"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="720"/>

  <text class="title" x="28" y="28">战斗主界面操作动线示意图</text>
  <text class="hint" x="28" y="54">核心原则：战斗可读性优先，状态靠边，操作稳定，二级内容临时展开</text>

  <rect class="stage" x="28" y="84" width="1220" height="530" rx="18"/>

  <rect class="panel" x="54" y="104" width="330" height="72" rx="10"/>
  <text class="text" x="82" y="132">玩家状态区</text>
  <text class="small" x="82" y="158">HP / 护盾 / 等级 / 关键 Buff</text>
  <rect x="204" y="122" width="145" height="16" rx="8" fill="#5a2d2d"/>
  <rect x="204" y="122" width="104" height="16" rx="8" fill="#d75245"/>
  <rect x="204" y="148" width="145" height="10" rx="5" fill="#344b65"/>
  <rect x="204" y="148" width="92" height="10" rx="5" fill="#5fa4e8"/>

  <rect class="danger" x="404" y="100" width="460" height="78" rx="10"/>
  <text class="text" x="574" y="128">Boss 状态区</text>
  <text class="small" x="534" y="156">名称 / 血条 / 阶段 / 狂暴提示</text>
  <rect x="449" y="138" width="370" height="18" rx="9" fill="#6b3030"/>
  <rect x="449" y="138" width="258" height="18" rx="9" fill="#df4d42"/>

  <rect class="panel" x="900" y="104" width="310" height="72" rx="10"/>
  <text class="text" x="936" y="132">波次与目标</text>
  <text class="small" x="936" y="158">第 3/8 波    剩余怪物 42</text>

  <rect class="danger" x="474" y="208" width="320" height="58" rx="10"/>
  <text class="text" x="560" y="232">危险预警层</text>
  <text class="small" x="514" y="256">Boss 技能范围 / 地面红圈 / 打断提示</text>

  <circle cx="630" cy="392" r="34" fill="#87d37c" stroke="#efffe8" stroke-width="4"/>
  <text class="hudText" x="595" y="449">玩家</text>
  <circle cx="500" cy="376" r="20" fill="#c96b5d"/>
  <circle cx="548" cy="328" r="18" fill="#c96b5d"/>
  <circle cx="735" cy="348" r="21" fill="#c96b5d"/>
  <circle cx="790" cy="408" r="18" fill="#c96b5d"/>
  <text class="hint" x="500" y="502">怪物潮保持在画面主体，HUD 不长期遮挡</text>

  <rect class="panel2" x="338" y="380" width="260" height="120" rx="10"/>
  <text class="text" x="370" y="410">二级操作弹窗</text>
  <text class="small" x="370" y="437">选中发射器后贴近展开</text>
  <text class="small" x="370" y="464">换 Buff / 查看详情 / 升级</text>

  <rect class="button" x="54" y="548" width="160" height="62" rx="12"/>
  <text class="text" x="86" y="574">自动战斗</text>
  <text class="small" x="90" y="596">开 / 关稳定入口</text>

  <rect class="panel" x="250" y="548" width="500" height="62" rx="10"/>
  <text class="text" x="282" y="586">发射器 / 技能槽：固定位置，形成肌肉记忆</text>

  <circle class="skill" cx="825" cy="580" r="36"/>
  <text class="hudText" x="811" y="587">1</text>
  <circle class="skill" cx="910" cy="580" r="36"/>
  <path class="cooldown" d="M910 544 A36 36 0 0 1 946 580 L910 580 Z"/>
  <text class="hudText" x="896" y="587">2</text>
  <circle class="skill" cx="995" cy="580" r="36"/>
  <text class="hudText" x="981" y="587">3</text>
  <circle class="skill" cx="1080" cy="580" r="36"/>
  <text class="hudText" x="1066" y="587">4</text>

  <rect class="button" x="1140" y="548" width="70" height="62" rx="12"/>
  <text class="text" x="1160" y="586">暂停</text>

  <path class="arrow" d="M468 548 C468 520 468 520 468 500"/>
  <path class="flow" d="M144 548 C210 475 270 430 338 420"/>
  <text class="hint" x="132" y="520">点击自动/槽位</text>
  <path class="flow" d="M825 544 C770 500 720 460 663 412"/>
  <text class="hint" x="805" y="520">释放技能</text>
  <path class="flow" d="M634 266 C634 312 634 348 634 358"/>
  <text class="hint" x="660" y="306">预警引导视线</text>

  <rect x="28" y="650" width="1220" height="46" rx="10" fill="#10171c" stroke="#3f5058"/>
  <text class="hudText" x="70" y="680">校验点：</text>
  <text class="hint" x="150" y="680">血条不抢战斗主体</text>
  <text class="hint" x="345" y="680">技能按钮位置固定</text>
  <text class="hint" x="545" y="680">危险提示靠近发生区域</text>
  <text class="hint" x="775" y="680">二级面板临时展开</text>
  <text class="hint" x="970" y="680">点击后立即反馈</text>
</svg>

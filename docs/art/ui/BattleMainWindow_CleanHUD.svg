<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .panel { fill: rgba(18,26,31,0.78); stroke: #d6b35a; stroke-width: 2; }
      .soft { fill: rgba(246,239,217,0.92); stroke: #c7aa64; stroke-width: 2; }
      .danger { fill: rgba(255,225,223,0.92); stroke: #d85d58; stroke-width: 2; }
      .slot { fill: rgba(25,35,42,0.88); stroke: #d6b35a; stroke-width: 3; }
      .darkText { font: 700 16px sans-serif; fill: #1f2a30; }
      .smallDark { font: 400 12px sans-serif; fill: #34444c; }
      .lightText { font: 700 16px sans-serif; fill: #f8f1dc; }
      .smallLight { font: 400 12px sans-serif; fill: #d9e2df; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="none"/>

  <g filter="url(#shadow)">
    <rect class="soft" x="48" y="48" width="280" height="74" rx="12"/>
    <text class="darkText" x="76" y="76">玩家状态</text>
    <text class="smallDark" x="76" y="101">HP / 护盾 / 等级</text>
    <rect x="176" y="67" width="118" height="12" rx="6" fill="#5a2d2d"/>
    <rect x="176" y="67" width="84" height="12" rx="6" fill="#d75245"/>
    <rect x="176" y="92" width="118" height="8" rx="4" fill="#344b65"/>
    <rect x="176" y="92" width="78" height="8" rx="4" fill="#5fa4e8"/>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel" x="390" y="42" width="500" height="82" rx="18"/>
    <text class="lightText" x="596" y="70">Boss 状态</text>
    <rect x="445" y="84" width="390" height="16" rx="8" fill="#6b3030"/>
    <rect x="445" y="84" width="270" height="16" rx="8" fill="#df4d42"/>
    <text class="smallLight" x="617" y="113">0/0</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="soft" x="930" y="48" width="300" height="74" rx="12"/>
    <text class="darkText" x="960" y="78">第 3/8 波</text>
    <text class="smallDark" x="960" y="102">剩余怪物 42</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="danger" x="480" y="150" width="320" height="48" rx="10"/>
    <text class="darkText" x="590" y="171">危险预警</text>
    <text class="smallDark" x="540" y="190">Boss 技能范围 / 地面红圈</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="soft" x="48" y="610" width="150" height="58" rx="12"/>
    <text class="darkText" x="83" y="636">自动战斗</text>
    <text class="smallDark" x="85" y="656">开 / 关</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="panel" x="250" y="610" width="430" height="58" rx="12"/>
    <text class="lightText" x="290" y="645">发射器 / 技能槽</text>
    <text class="smallLight" x="430" y="645">固定底部，减少遮挡</text>
  </g>

  <g filter="url(#shadow)">
    <circle class="slot" cx="805" cy="638" r="34"/>
    <text class="lightText" x="800" y="645">1</text>
    <circle class="slot" cx="890" cy="638" r="34"/>
    <text class="lightText" x="885" y="645">2</text>
    <circle class="slot" cx="975" cy="638" r="34"/>
    <text class="lightText" x="970" y="645">3</text>
    <circle class="slot" cx="1060" cy="638" r="34"/>
    <text class="lightText" x="1055" y="645">4</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="soft" x="1144" y="610" width="68" height="58" rx="12"/>
    <text class="darkText" x="1162" y="645">暂停</text>
  </g>
</svg>
